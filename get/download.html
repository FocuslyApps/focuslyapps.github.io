<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Imposter</title>
  <!--
    Smart redirect page for QR codes / shared links. NO backend required.
    Host this on GitHub Pages (e.g. focuslyapps.github.io/get) and point the
    in-app QR code at that URL. It detects the visitor's OS and forwards them
    to the correct store, so one QR works for both iPhone and Android.
  -->
  <link rel="icon" href="data:," />
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #2E1A47 0%, #1A1025 60%, #0D0D14 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 420px;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 8px;
    }

    p {
      opacity: .8;
      margin: 0 0 28px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      margin: 12px auto;
      max-width: 280px;
      padding: 16px 20px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      background: linear-gradient(135deg, #8E2DE2, #DA22FF);
    }

    .btn.alt {
      background: rgba(255, 255, 255, .12);
    }

    .store-btn {
      display: block;
      margin: 16px auto;
      max-width: 260px;
    }

    .store-btn img {
      display: block;
      width: 100%;
      max-height: 70px;
      object-fit: contain;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🤫 Get Imposter</h1>
    <p>Redirecting you to your app store…<br />If nothing happens, pick your store below.</p>
    <a href="https://apps.apple.com/app/id6757858367" target="_blank" class="store-btn">
      <img src="../assets/appstore.svg" alt="Imposter: Download on the App Store">
    </a>
    <a href="https://play.google.com/store/apps/details?id=com.productivitypulse.findwhosdifferent" target="_blank"
      class="store-btn">
      <img src="../assets/playstore.svg" alt="Imposter: Get it on Google Play">
    </a>
  </div>

  <script>
    (function () {
      var APP_STORE = "https://apps.apple.com/app/id6757858367";
      var PLAY_STORE = "https://play.google.com/store/apps/details?id=com.productivitypulse.findwhosdifferent";
      var ua = navigator.userAgent || navigator.vendor || "";

      var isIOS = /iPad|iPhone|iPod/.test(ua) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1); // iPadOS
      var isAndroid = /android/i.test(ua);

      if (isIOS) {
        window.location.replace(APP_STORE);
      } else if (isAndroid) {
        window.location.replace(PLAY_STORE);
      }
      // Desktop / unknown: stay on the page so they can choose a button.
    })();
  </script>
</body>

</html>
